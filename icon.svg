<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 그래디언트 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 흰색 둥근 사각형 -->
  <rect x="51" y="51" width="410" height="410" rx="40" fill="white"/>

  <!-- 체크박스 1 (체크됨) -->
  <rect x="102" y="115" width="50" height="50" rx="5" fill="none" stroke="#4169E1" stroke-width="3"/>
  <line x1="122" y1="150" x2="137" y2="165" stroke="#4169E1" stroke-width="4" stroke-linecap="round"/>
  <line x1="137" y1="165" x2="167" y2="125" stroke="#4169E1" stroke-width="4" stroke-linecap="round"/>

  <!-- 텍스트 줄 1 -->
  <rect x="175" y="125" width="200" height="10" rx="5" fill="#E0E0E0"/>

  <!-- 체크박스 2 (체크됨) -->
  <rect x="102" y="205" width="50" height="50" rx="5" fill="none" stroke="#4169E1" stroke-width="3"/>
  <line x1="122" y1="240" x2="137" y2="255" stroke="#4169E1" stroke-width="4" stroke-linecap="round"/>
  <line x1="137" y1="255" x2="167" y2="215" stroke="#4169E1" stroke-width="4" stroke-linecap="round"/>

  <!-- 텍스트 줄 2 -->
  <rect x="175" y="215" width="200" height="10" rx="5" fill="#E0E0E0"/>

  <!-- 체크박스 3 (미체크) -->
  <rect x="102" y="295" width="50" height="50" rx="5" fill="none" stroke="#4169E1" stroke-width="3"/>

  <!-- 텍스트 줄 3 -->
  <rect x="175" y="305" width="200" height="10" rx="5" fill="#E0E0E0"/>

  <!-- 앱 이름 텍스트 -->
  <text x="256" y="410" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#4169E1">할일 메모장</text>
</svg>